services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - WATCHPACK_POLLING=true # Giúp Docker nhận diện thay đổi file trên Windows/macOS
